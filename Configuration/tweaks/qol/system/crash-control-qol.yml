---
title: Configure Crash Control
description: Configures the BSoD to show useful information while retaining only a small minidump and the System event-log record for diagnostics
actions:
  - !registryValue:
    path: 'HKLM\SYSTEM\CurrentControlSet\Control\CrashControl'
    value: 'AutoReboot'
    data: '0'
    type: REG_DWORD
  - !registryValue:
    path: 'HKLM\SYSTEM\CurrentControlSet\Control\CrashControl'
    value: 'CrashDumpEnabled'
    data: '3' # Small memory dump; full memory dumps remain disabled
    type: REG_DWORD
  - !registryValue:
    path: 'HKLM\SYSTEM\CurrentControlSet\Control\CrashControl'
    value: 'LogEvent'
    data: '1' # Preserve the bugcheck record in the System event log
    type: REG_DWORD
  - !registryValue:
    path: 'HKLM\SYSTEM\CurrentControlSet\Control\CrashControl'
    value: 'DisplayParameters'
    data: '1'
    type: REG_DWORD
  - !registryValue:
    path: 'HKLM\SYSTEM\CurrentControlSet\Control\CrashControl\StorageTelemetry'
    value: 'DeviceDumpEnabled'
    data: '0'
    type: REG_DWORD
